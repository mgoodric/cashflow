name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: read

jobs:
  codeql:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - uses: github/codeql-action/autobuild@v3

      - uses: github/codeql-action/analyze@v3
        with:
          output: codeql-results
          upload: never

      - name: Print CodeQL results
        if: always()
        run: |
          echo "=== CodeQL SARIF Results ==="
          for f in codeql-results/*.sarif; do
            echo "--- $f ---"
            jq '.runs[].results[] | {ruleId, message: .message.text, location: .locations[0].physicalLocation.artifactLocation.uri}' "$f" 2>/dev/null || echo "No issues found"
          done

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cashflow:scan
          load: true

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: cashflow:scan
          format: table
          severity: CRITICAL,HIGH
