name: Security

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  packages: read

jobs:
  eslint-security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Run ESLint security checks
        run: npx eslint --max-warnings 0 . || true

  trivy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: cashflow:scan
          load: true

      - uses: aquasecurity/trivy-action@master
        with:
          image-ref: cashflow:scan
          format: table
          severity: CRITICAL,HIGH
